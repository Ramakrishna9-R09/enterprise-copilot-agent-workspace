name: Validate Agent Workspace

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate Copilot agent workspace
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workspace contract
        shell: pwsh
        run: ./tools/validate-workspace.ps1
